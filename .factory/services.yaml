commands:
  install: pnpm install
  typecheck: pnpm -r typecheck
  build: pnpm build
  test: pnpm exec vitest run ui/src/ packages/orchestrator-tui/ --max-workers=3
  lint: echo "no lint configured"

services:
  dev:
    start: PORT=3100 pnpm dev:once &
    stop: lsof -ti :3100 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3100/api/health
    port: 3100
    depends_on: []
