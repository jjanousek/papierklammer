commands:
  install: pnpm install
  typecheck: pnpm -r --workspace-concurrency=1 typecheck
  build: pnpm -r --workspace-concurrency=1 build
  test: pnpm exec vitest run ui/src/components/OnboardingWizard.test.tsx ui/src/lib/onboarding-route.test.ts ui/src/lib/onboarding-launch.test.ts ui/src/lib/onboarding-goal.test.ts server/src/__tests__/invite-onboarding-text.test.ts server/src/__tests__/openclaw-invite-prompt-route.test.ts server/src/__tests__/invite-accept-gateway-defaults.test.ts server/src/__tests__/invite-accept-replay.test.ts server/src/__tests__/invite-expiry.test.ts server/src/__tests__/invite-join-grants.test.ts server/src/__tests__/invite-join-manager.test.ts server/src/__tests__/company-portability-routes.test.ts cli/src/__tests__/onboard.test.ts --maxWorkers=1
  lint: echo "no lint configured"
  health: curl -sf http://127.0.0.1:3100/api/health
  companies: curl -sf http://127.0.0.1:3100/api/companies

services:
  qa-app:
    start: env PAPIERKLAMMER_HOME=/tmp/papierklammer-onboarding-mission PAPIERKLAMMER_INSTANCE_ID=onboarding-mission PORT=3100 sh -c 'mkdir -p /tmp/papierklammer-onboarding-mission && echo $$ > /tmp/papierklammer-onboarding-mission/qa-app.pid && exec node /Users/aischool/work/papierklammer_droid/server/dist/index.js'
    stop: sh -c 'if [ -f /tmp/papierklammer-onboarding-mission/qa-app.pid ]; then kill $(cat /tmp/papierklammer-onboarding-mission/qa-app.pid) 2>/dev/null || true; rm -f /tmp/papierklammer-onboarding-mission/qa-app.pid; fi'
    healthcheck: curl -sf http://127.0.0.1:3100/api/health
    port: 3100
    depends_on: []
