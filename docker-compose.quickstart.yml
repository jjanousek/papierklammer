services:
  paperclip:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PAPIERKLAMMER_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      PAPIERKLAMMER_HOME: "/paperclip"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      PAPIERKLAMMER_DEPLOYMENT_MODE: "authenticated"
      PAPIERKLAMMER_DEPLOYMENT_EXPOSURE: "private"
      PAPIERKLAMMER_PUBLIC_URL: "${PAPIERKLAMMER_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${PAPIERKLAMMER_DATA_DIR:-./data/docker-paperclip}:/paperclip"
